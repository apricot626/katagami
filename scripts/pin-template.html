<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><style>
  :root{--paper:#F5F4EE;--paper2:#ECEBE3;--ink:#1B1D1A;--blue:#2E63B4;--red:#C24033;--rule:#C9C6B8;--muted:#6b6b60;}
  *{margin:0;box-sizing:border-box}
  html,body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif}
  #pin{width:1000px;height:1500px;background:var(--paper);position:relative;overflow:hidden}
  .top{height:430px;background:var(--red);color:#fff;padding:54px 60px 0;position:relative}
  .brand{font-size:36px;font-weight:900;letter-spacing:.22em;opacity:.98}
  .catch{font-size:42px;font-weight:800;margin-top:40px;letter-spacing:.04em;opacity:.96}
  .pname{font-size:98px;font-weight:900;line-height:1.08;margin-top:14px;letter-spacing:.01em}
  .pen{font-size:34px;font-weight:600;opacity:.9;margin-top:12px;letter-spacing:.02em}
  .mid{position:absolute;top:430px;left:0;right:0;height:760px}
  #grid,#diagram{position:absolute;inset:0}
  .bottom{position:absolute;bottom:0;left:0;right:0;height:310px;padding:0 60px;display:flex;flex-direction:column;justify-content:center;border-top:2px dashed var(--rule)}
  .chips{display:flex;gap:16px;flex-wrap:wrap}
  .chip{font-size:30px;font-weight:800;color:#fff;background:var(--ink);padding:12px 26px;border-radius:5px}
  .chip.v{background:var(--red)}
  .url{font-size:58px;font-weight:800;color:var(--ink);letter-spacing:.04em;margin-top:26px}
  .sub{font-size:30px;color:var(--muted);margin-top:6px}
</style></head><body>
<div id="pin">
  <div class="top">
    <div class="brand">カタ<b>ガミ</b></div>
    <div class="catch" id="catch">サイズ自由の無料型紙</div>
    <div class="pname" id="pname">—</div>
    <div class="pen" id="pen"></div>
  </div>
  <div class="mid">
    <svg id="grid" viewBox="0 0 1000 760" preserveAspectRatio="none"></svg>
    <svg id="diagram" viewBox="0 0 1000 760" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div class="bottom">
    <div class="chips" id="chips"></div>
    <div class="url">katagami.org</div>
    <div class="sub" id="sub">数値を入れるだけ・A4に実寸印刷</div>
  </div>
</div>
<script>window.KATAGAMI_LANG=new URLSearchParams(location.search).get('lang')||'ja';</script>
<script src="../i18n.js"></script>
<script src="../patterns.js"></script>
<script>
const EN=(new URLSearchParams(location.search).get('lang'))==='en';
const NS="http://www.w3.org/2000/svg";
function S(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function bb(p){let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;for(const q of p){x0=Math.min(x0,q.x);y0=Math.min(y0,q.y);x1=Math.max(x1,q.x);y1=Math.max(y1,q.y);}return{x0,y0,x1,y1,w:x1-x0,h:y1-y0};}
function pts(a){return a.map(p=>p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");}
const grid=document.getElementById('grid');
for(let x=0;x<=1000;x+=40) grid.appendChild(S('line',{x1:x,y1:0,x2:x,y2:760,stroke:'#D8D5C7','stroke-width':1}));
for(let y=0;y<=760;y+=40) grid.appendChild(S('line',{x1:0,y1:y,x2:1000,y2:y,stroke:'#D8D5C7','stroke-width':1}));
const key=new URLSearchParams(location.search).get('p')||'tote';
const def=PATTERNS[key];
const jaName=def.name, enName=(window.KG&&KG.name(key,def.name))||def.name;
document.getElementById('pname').textContent=EN?enName:jaName;
document.getElementById('pen').textContent=EN?"":(enName&&enName!==jaName?enName:"");
document.getElementById('catch').textContent=EN?"Free PDF sewing pattern":"サイズ自由の無料型紙";
document.getElementById('sub').textContent=EN?"Enter your size · print at home (A4 / Letter)":"数値を入れるだけ・A4に実寸印刷";
const chips=EN?["Free","Any size","Seam allowance"]:["無料","サイズ自由","縫い代込み"];
const cw=document.getElementById('chips');
chips.forEach((c,i)=>{const d=document.createElement('div');d.className='chip'+(i===0?' v':'');d.textContent=c;cw.appendChild(d);});
const params={};(def.params||[]).forEach(f=>params[f.key]=f.val);
const tog={};(def.toggles||[]).forEach(t=>tog[t.key]=t.val);
const res=def.gen({...params,...tog},10);
const GAP=70,PAD=16;let curX=PAD,rowH=0,totalW=0;
const placed=res.pieces.map(pc=>{const b=bb(pc.cut);const ox=curX-b.x0;curX+=b.w+GAP;rowH=Math.max(rowH,b.h);totalW=curX-GAP+PAD;return{pc,ox,oy:PAD-b.y0};});
const totalH=rowH+PAD*2;
const svg=document.getElementById('diagram');
const VW=1000,VH=760,M=70;
const sc=Math.min((VW-2*M)/totalW,(VH-2*M)/totalH);
const offX=(VW-totalW*sc)/2,offY=(VH-totalH*sc)/2;
const g=S('g',{transform:`translate(${offX},${offY}) scale(${sc})`});svg.appendChild(g);
placed.forEach(({pc,ox,oy})=>{
  const gg=S('g',{transform:`translate(${ox},${oy})`});g.appendChild(gg);
  gg.appendChild(S('polygon',{points:pts(pc.finished),fill:'none',stroke:'#2E63B4','stroke-width':2/sc,'stroke-dasharray':`${8/sc} ${6/sc}`}));
  gg.appendChild(S('polygon',{points:pts(pc.cut),fill:'rgba(46,99,180,0.05)',stroke:'#C24033','stroke-width':3/sc}));
  if(pc.foldX!=null){const b=bb(pc.cut);gg.appendChild(S('line',{x1:pc.foldX,y1:b.y0,x2:pc.foldX,y2:b.y1,stroke:'#1B1D1A','stroke-width':2/sc,'stroke-dasharray':`${10/sc} ${4/sc}`}));}
});
document.title="ready";
</script></body></html>
