<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  :root{--paper:#ECEBE3;--paper2:#F5F4EE;--ink:#1B1D1A;--chalk:#2E63B4;--vermilion:#C24033;--rule:#C9C6B8;--muted:#6b6b60;}
  *{margin:0;box-sizing:border-box}
  html,body{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif}
  #card{width:1200px;height:630px;background:var(--paper);position:relative;overflow:hidden;display:flex}
  .left{width:470px;padding:64px 0 56px 64px;display:flex;flex-direction:column}
  .brand{font-size:30px;font-weight:800;letter-spacing:.22em;color:var(--ink)}
  .brand b{color:var(--vermilion)}
  .name{font-size:58px;font-weight:800;line-height:1.16;margin-top:38px;color:var(--ink);letter-spacing:.01em}
  .name .en{display:block;font-size:23px;font-weight:600;color:var(--muted);margin-top:14px;letter-spacing:.02em}
  .sub{font-size:21px;color:var(--muted);margin-top:auto;line-height:1.6}
  .chips{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .chip{font-size:17px;font-weight:700;color:#fff;background:var(--ink);padding:7px 16px;border-radius:3px}
  .chip.v{background:var(--vermilion)}
  .right{flex:1;position:relative;border-left:1.5px dashed var(--rule)}
  #grid,#diagram{position:absolute;inset:0}
  .url{position:absolute;right:34px;bottom:26px;font-size:20px;font-weight:700;color:var(--ink);letter-spacing:.04em}
</style>
</head>
<body>
<div id="card">
  <div class="left">
    <div class="brand">カタ<b>ガミ</b></div>
    <div class="name" id="pname">—<span class="en" id="pen"></span></div>
    <div class="sub">
      好きなサイズで型紙を自動製図
      <div class="chips"><span class="chip v">無料</span><span class="chip">A4・実寸印刷</span><span class="chip">縫い代こみ</span></div>
    </div>
  </div>
  <div class="right">
    <svg id="grid" viewBox="0 0 700 630" preserveAspectRatio="none"></svg>
    <svg id="diagram" viewBox="0 0 700 630" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="url">katagami.org</div>
  </div>
</div>

<script>window.KATAGAMI_LANG='en';</script>
<script src="../i18n.js"></script>
<script src="../patterns.js"></script>
<script>
const NS="http://www.w3.org/2000/svg";
function S(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function bb(p){let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;for(const q of p){x0=Math.min(x0,q.x);y0=Math.min(y0,q.y);x1=Math.max(x1,q.x);y1=Math.max(y1,q.y);}return{x0,y0,x1,y1,w:x1-x0,h:y1-y0};}
function pts(a){return a.map(p=>p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");}

// faint grid in the right panel
const grid=document.getElementById('grid');
for(let x=0;x<=700;x+=35) grid.appendChild(S('line',{x1:x,y1:0,x2:x,y2:630,stroke:'#D8D5C7','stroke-width':0.8}));
for(let y=0;y<=630;y+=35) grid.appendChild(S('line',{x1:0,y1:y,x2:700,y2:y,stroke:'#D8D5C7','stroke-width':0.8}));

const key=new URLSearchParams(location.search).get('p')||'tee';
const def=PATTERNS[key];
document.getElementById('pname').childNodes[0].nodeValue=def.name;
const en=(window.KG&&KG.name(key,def.name))||"";
document.getElementById('pen').textContent=(en&&en!==def.name)?en:"";

const params={};(def.params||[]).forEach(f=>params[f.key]=f.val);
const tog={};(def.toggles||[]).forEach(t=>tog[t.key]=t.val);
const res=def.gen({...params,...tog},10);

const GAP=70,PAD=16;let curX=PAD,rowH=0,totalW=0;
const placed=res.pieces.map(pc=>{const b=bb(pc.cut);const ox=curX-b.x0;curX+=b.w+GAP;rowH=Math.max(rowH,b.h);totalW=curX-GAP+PAD;return{pc,ox,oy:PAD-b.y0};});
const totalH=rowH+PAD*2;
const svg=document.getElementById('diagram');
const VW=700,VH=630,M=78;
const sc=Math.min((VW-2*M)/totalW,(VH-2*M)/totalH);
const offX=(VW-totalW*sc)/2,offY=(VH-totalH*sc)/2;
const g=S('g',{transform:`translate(${offX},${offY}) scale(${sc})`});svg.appendChild(g);
placed.forEach(({pc,ox,oy})=>{
  const gg=S('g',{transform:`translate(${ox},${oy})`});g.appendChild(gg);
  gg.appendChild(S('polygon',{points:pts(pc.finished),fill:'none',stroke:'#2E63B4','stroke-width':2/sc,'stroke-dasharray':`${8/sc} ${6/sc}`}));
  gg.appendChild(S('polygon',{points:pts(pc.cut),fill:'rgba(46,99,180,0.05)',stroke:'#C24033','stroke-width':3/sc}));
  if(pc.foldX!=null){const b=bb(pc.cut);gg.appendChild(S('line',{x1:pc.foldX,y1:b.y0,x2:pc.foldX,y2:b.y1,stroke:'#1B1D1A','stroke-width':2/sc,'stroke-dasharray':`${10/sc} ${4/sc}`}));}
});
document.title="ready";
</script>
</body>
</html>
