<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カタガミ｜数値入力でつくる洋裁の型紙</title>
<meta name="description" content="採寸した数値を入れるだけで、Tシャツ・巾着・トートバッグ・蝶ネクタイ・犬服などの型紙を自動製図。A4分割で実寸印刷でき、50mm校正枠で倍率も確認できる無料ツールです。">
<meta name="keywords" content="型紙,洋裁,自動製図,A4,実寸,印刷,Tシャツ,巾着,トートバッグ,蝶ネクタイ,犬服,ハンドメイド">
<meta property="og:type" content="website">
<meta property="og:title" content="カタガミ｜数値入力でつくる洋裁の型紙">
<meta property="og:description" content="数値を入れるだけで洋裁の型紙を自動製図。A4分割で実寸印刷できます。">
<meta property="og:locale" content="ja_JP">
<style>
  :root{
    --paper:#ECEBE3;        /* 製図用紙 */
    --paper2:#F5F4EE;
    --ink:#1B1D1A;          /* 製図インク */
    --chalk:#2E63B4;        /* チャコ・縫い線 */
    --chalk-soft:#7fa3d6;
    --tape:#E0A23C;         /* メジャーの黄 */
    --vermilion:#C24033;    /* 裁ち切り線・赤の製図線 */
    --rule:#C9C6B8;
    --rule-soft:#dedbcf;
    --muted:#6b6b60;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    background-image:
      linear-gradient(var(--rule-soft) 1px,transparent 1px),
      linear-gradient(90deg,var(--rule-soft) 1px,transparent 1px);
    background-size:18px 18px;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}

  /* ---- layout ---- */
  header{
    display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    padding:14px 20px;border-bottom:1.5px solid var(--ink);
    background:var(--paper);
  }
  header .brand{font-size:22px;font-weight:800;letter-spacing:.22em}
  header .brand b{color:var(--vermilion)}
  header .tag{font-size:12px;color:var(--muted);letter-spacing:.04em}
  header .sheets{margin-left:auto;display:flex;align-items:center;gap:10px}
  .sheet-chip{
    font-size:12px;border:1.5px solid var(--ink);padding:4px 10px;border-radius:2px;
    background:var(--paper2)
  }
  .sheet-chip b{font-size:15px}

  main{display:grid;grid-template-columns:320px 1fr;gap:0;height:calc(100% - 56px)}
  @media (max-width:820px){
    main{grid-template-columns:1fr;height:auto}
    .preview-wrap{min-height:60vh}
  }

  /* ---- controls ---- */
  .panel{
    border-right:1.5px solid var(--ink);
    padding:16px;overflow-y:auto;background:var(--paper2);
  }
  .mode-tabs{display:flex;gap:0;margin-bottom:12px;border:1.5px solid var(--ink);border-radius:2px;overflow:hidden}
  .mode-tabs button{
    flex:1;font-family:inherit;font-size:11.5px;cursor:pointer;padding:8px 2px;
    border:none;border-right:1px solid var(--ink);background:var(--paper);color:var(--ink);
    transition:.12s;line-height:1.25;
  }
  .mode-tabs button:last-child{border-right:none}
  .mode-tabs button[aria-pressed="true"]{background:var(--chalk);color:#fff}
  .mode-tabs button:hover:not([aria-pressed="true"]){background:var(--rule-soft)}
  .pat-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .pat-tabs button{
    flex:1;min-width:88px;font-family:inherit;font-size:12.5px;cursor:pointer;
    padding:9px 6px;border:1.5px solid var(--ink);background:var(--paper);
    border-radius:2px;color:var(--ink);transition:.12s;line-height:1.3;
  }
  .pat-tabs button[aria-pressed="true"]{background:var(--ink);color:var(--paper2)}
  .pat-tabs button:hover{background:var(--tape)}

  .pat-note{font-size:11.5px;color:var(--muted);line-height:1.55;
    border-left:2.5px solid var(--tape);padding:4px 0 4px 9px;margin:0 0 16px}

  .field{margin-bottom:13px}
  .field label{display:flex;justify-content:space-between;align-items:baseline;
    font-size:12.5px;margin-bottom:5px}
  .field label .v{font-size:13px;font-weight:700}
  .field label .unit{color:var(--muted);font-size:11px;margin-left:2px}
  .field input[type=range]{width:100%;accent-color:var(--chalk);margin:0}
  .row{display:flex;gap:8px;align-items:center}
  .row input[type=number]{
    width:74px;font-family:ui-monospace,monospace;font-size:13px;text-align:right;
    padding:5px 7px;border:1.5px solid var(--rule);border-radius:2px;background:var(--paper);
  }
  .row input[type=number]:focus{outline:2px solid var(--chalk);border-color:var(--chalk)}

  .toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:13px;cursor:pointer}
  .toggle input{accent-color:var(--chalk);width:16px;height:16px}
  .presets{margin-bottom:14px}
  .presets .ptitle{font-size:11px;color:var(--muted);margin-bottom:6px}
  .presets .prow{display:flex;gap:6px;flex-wrap:wrap}
  .presets button{
    font-family:inherit;font-size:12px;cursor:pointer;padding:6px 10px;
    border:1.5px solid var(--ink);background:var(--paper);border-radius:2px;
    color:var(--ink);transition:.12s;line-height:1.2;
  }
  .presets button:hover{background:var(--tape)}

  .divider{border:none;border-top:1px dashed var(--rule);margin:16px 0}
  .sec-h{font-size:11px;letter-spacing:.14em;color:var(--muted);margin:0 0 10px;font-weight:700}

  .print-btn{
    width:100%;font-family:inherit;font-size:15px;font-weight:800;letter-spacing:.08em;
    padding:13px;border:1.5px solid var(--ink);background:var(--vermilion);color:#fff;
    border-radius:2px;cursor:pointer;margin-top:4px;
  }
  .print-btn:hover{background:#a8362b}
  .scale-warn{font-size:11px;color:var(--muted);line-height:1.55;margin-top:9px}
  .scale-warn b{color:var(--vermilion)}

  /* ---- preview ---- */
  .preview-wrap{position:relative;overflow:auto;display:flex;
    align-items:center;justify-content:center;padding:26px}
  .preview-inner{position:relative}
  svg.preview{display:block;background:var(--paper2);
    box-shadow:0 1px 0 var(--rule),0 14px 30px -18px rgba(0,0,0,.4);
    border:1px solid var(--rule)}
  .legend{position:absolute;left:18px;bottom:14px;display:flex;gap:14px;flex-wrap:wrap;
    font-size:11px;background:rgba(245,244,238,.9);padding:7px 11px;border:1px solid var(--rule);
    border-radius:2px}
  .legend i{display:inline-block;width:22px;height:0;vertical-align:middle;margin-right:5px}
  .lg-cut i{border-top:2.5px solid var(--vermilion)}
  .lg-sew i{border-top:2px dashed var(--chalk)}
  .lg-fold i{border-top:2px dashed var(--ink)}
  .lg-grid i{border-top:1.5px dashed var(--tape)}

  /* ---- print ---- */
  #print-root{display:none}
  @media print{
    @page{size:A4;margin:0}
    body{background:#fff;background-image:none}
    .app{display:none!important}
    #print-root{display:block}
    .sheet{
      width:210mm;height:297mm;position:relative;overflow:hidden;
      page-break-after:always;break-after:page;background:#fff;
    }
    .sheet:last-child{page-break-after:auto}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">カタ<b>ガミ</b></div>
    <div class="tag">数値を入れるだけ — 洋裁の型紙を実寸でA4に</div>
    <div class="sheets">
      <span class="sheet-chip">必要シート <b id="sheetCount" class="mono">–</b> 枚 <span style="color:var(--muted)">＋案内1</span></span>
    </div>
  </header>

  <main>
    <section class="panel" id="panel">
      <div class="mode-tabs" id="modeTabs"></div>
      <div class="pat-tabs" id="patTabs"></div>
      <p class="pat-note" id="patNote"></p>
      <div id="fields"></div>

      <hr class="divider">
      <p class="sec-h">縫い代・出力</p>
      <div class="field">
        <label>縫い代 <span><span class="v mono" id="saV"></span><span class="unit">cm</span></span></label>
        <div class="row">
          <input type="range" id="saRange" min="0" max="3" step="0.5">
          <input type="number" id="saNum" min="0" max="5" step="0.1">
        </div>
      </div>
      <label class="toggle"><input type="checkbox" id="showSew" checked> 出来上がり線（縫い線）を表示</label>

      <hr class="divider">
      <button class="print-btn" id="printBtn">印刷する（A4・実寸）</button>
      <p class="scale-warn">
        印刷ダイアログで <b>倍率＝100%（実際のサイズ）</b> にし、「用紙に合わせる」は必ずオフにしてください。
        1枚目の案内シートにある <b>50mmの校正枠</b> を定規で測り、ぴったり50mmなら成功です。
      </p>
    </section>

    <section class="preview-wrap">
      <div class="preview-inner">
        <svg class="preview" id="preview"></svg>
      </div>
      <div class="legend">
        <span class="lg-cut"><i></i>裁ち切り線</span>
        <span class="lg-sew"><i></i>出来上がり線</span>
        <span class="lg-fold"><i></i>わ（輪）</span>
        <span class="lg-grid"><i></i>A4境界</span>
      </div>
    </section>
  </main>
</div>

<div id="print-root"></div>

<script>
/* ============================================================
   カタガミ — parametric sewing pattern → mm-accurate A4 tiling
   全長さ単位: mm（内部）。入力はcm。
   ============================================================ */

/* ---- A4 タイル設定 (mm) ---- */
const PAGE_W=210, PAGE_H=297, MARGIN=10, OVERLAP=10;
const CONTENT_W=PAGE_W-2*MARGIN;        // 190
const CONTENT_H=PAGE_H-2*MARGIN;        // 277
const STEP_X=CONTENT_W-OVERLAP;         // 180
const STEP_Y=CONTENT_H-OVERLAP;         // 267
const LAYOUT_GAP=22;                    // ピース間の隙間
const CANVAS_PAD=8;
const WRAP_W=640;                       // この幅でレイアウト改行

/* ---- 幾何ユーティリティ ---- */
function signedArea(p){let a=0;for(let i=0;i<p.length;i++){const q=p[(i+1)%p.length];a+=p[i].x*q.y-q.x*p[i].y;}return a/2;}
// pts: 時計回り(y-down)前提。dist: 各辺(pts[i]→pts[i+1])の外向きオフセット量
function offsetPolygon(pts, dist){
  let p=pts.slice(), d=dist.slice();
  if(signedArea(p)<0){p.reverse(); d.reverse();}
  const n=p.length, lines=[];
  for(let i=0;i<n;i++){
    const a=p[i], b=p[(i+1)%n];
    let dx=b.x-a.x, dy=b.y-a.y; const L=Math.hypot(dx,dy)||1; dx/=L; dy/=L;
    const nx=dy, ny=-dx;                       // area>0 巻きの外向き法線
    const off=d[i]||0;
    lines.push({x:a.x+nx*off, y:a.y+ny*off, dx, dy});
  }
  const out=[];
  for(let i=0;i<n;i++){
    const l1=lines[(i-1+n)%n], l2=lines[i];
    const det=l1.dx*(-l2.dy)-(-l1.dy)*l2.dx;
    if(Math.abs(det)<1e-9){out.push({x:l2.x,y:l2.y});continue;}
    const t=((l2.x-l1.x)*(-l2.dy)-(l2.y-l1.y)*(-l2.dx))/det;
    out.push({x:l1.x+l1.dx*t,y:l1.y+l1.dy*t});
  }
  return out;
}
function quad(p0,p1,p2,n){const a=[];for(let i=1;i<=n;i++){const t=i/n,u=1-t;
  a.push({x:u*u*p0.x+2*u*t*p1.x+t*t*p2.x,y:u*u*p0.y+2*u*t*p1.y+t*t*p2.y});}return a;}
function bbox(pts){let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;for(const p of pts){
  x0=Math.min(x0,p.x);y0=Math.min(y0,p.y);x1=Math.max(x1,p.x);y1=Math.max(y1,p.y);}
  return {x0,y0,x1,y1,w:x1-x0,h:y1-y0};}
function plen(a){let s=0;for(let i=1;i<a.length;i++)s+=Math.hypot(a[i].x-a[i-1].x,a[i].y-a[i-1].y);return s;}
const cm=v=>v*10; // cm→mm

/* ============================================================
   パターン定義
   各 generator(params, sa)  →  { pieces:[ piece... ] }
   piece = { title, cutInfo, finished:[{x,y}], cut:[{x,y}],
             grain:{x1,y1,x2,y2}|null, foldX:Number|null,
             notches:[{x,y}], labelAt:{x,y} }
   座標は piece ローカル(時計回り, y-down)。配置はレイアウト時に平行移動。
   ============================================================ */

function pieceFrom(finished, foldEdgeTest, sa){
  // foldEdgeTest(a,b) → true なら その辺は縫い代0(=わ)
  const dist=finished.map((p,i)=>{
    const b=finished[(i+1)%finished.length];
    return foldEdgeTest(p,b)?0:sa;
  });
  return {finished, cut:offsetPolygon(finished,dist)};
}

const PATTERNS={
  /* ---- 汎用パネル（四角） ---- */
  panel:{
    mode:"bag",
    name:"汎用パネル",
    note:"クッションカバー・バッグの面・小物などに。幅と高さを入れるだけ。片側を「わ」にすると左右対称に裁てます。",
    params:[
      {key:"w",label:"仕上がり幅",unit:"cm",min:5,max:120,step:0.5,val:40},
      {key:"h",label:"仕上がり高さ",unit:"cm",min:5,max:160,step:0.5,val:40},
    ],
    toggles:[{key:"fold",label:"左端を「わ」にする",val:false}],
    gen(p,sa){
      const W=cm(p.w),H=cm(p.h);
      const fin=[{x:0,y:0},{x:W,y:0},{x:W,y:H},{x:0,y:H}];
      const isFold=(a,b)=> p.fold && a.x===0 && b.x===0;
      const pc=pieceFrom(fin,isFold,sa);
      return {pieces:[{
        title:"パネル", cutInfo:p.fold?"「わ」で左右対称 ／ 必要枚数だけ裁断":"必要枚数だけ裁断",
        ...pc, foldX:p.fold?0:null,
        grain:{x1:W/2,y1:12,x2:W/2,y2:H-12},
        notches:[], labelAt:{x:W/2,y:H/2}
      }]};
    }
  },

  /* ---- トートバッグ（角マチ式） ---- */
  tote:{
    mode:"bag",
    name:"トートバッグ",
    note:"角マチ式。本体は底で輪に折って裁つ前提（前後つながり）。底角の四角を切り欠いて縫うとマチになります。持ち手は別ピース。",
    params:[
      {key:"w",label:"仕上がり幅",unit:"cm",min:15,max:55,step:0.5,val:34},
      {key:"h",label:"仕上がり高さ",unit:"cm",min:15,max:50,step:0.5,val:36},
      {key:"d",label:"マチ（底の奥行）",unit:"cm",min:2,max:24,step:0.5,val:12},
      {key:"hl",label:"持ち手の長さ",unit:"cm",min:20,max:80,step:1,val:55},
      {key:"hw",label:"持ち手の裁ち幅",unit:"cm",min:3,max:10,step:0.5,val:6},
    ],
    toggles:[],
    gen(p,sa){
      const W=cm(p.w),H=cm(p.h),D=cm(p.d),c=D/2;
      const PW=W+D, PH=H+c;        // 角マチ式の標準寸法
      // 本体（底=下端を「わ」にして前後一枚で裁つ）。下端中央が輪。
      const fin=[
        {x:0,y:0},{x:PW,y:0},
        {x:PW,y:PH-c},{x:PW-c,y:PH-c},{x:PW-c,y:PH},
        {x:c,y:PH},{x:c,y:PH-c},{x:0,y:PH-c}
      ];
      const isFold=(a,b)=> a.y===PH && b.y===PH; // 底辺=わ
      const pc=pieceFrom(fin,isFold,sa);
      const body={
        title:"本体", cutInfo:"底（下端）を「わ」に置いて 1枚 ／ 底角の□を切り欠く",
        ...pc, foldX:null, foldY:PH,
        grain:{x1:PW/2,y1:14,x2:PW/2,y2:PH-c-10},
        notches:[{x:PW-c,y:PH-c},{x:c,y:PH-c}],
        labelAt:{x:PW/2,y:(PH-c)/2},
        cornerMark:[{x:PW-c,y:PH-c,c},{x:0,y:PH-c,c}]
      };
      // 持ち手
      const HLL=cm(p.hl),HWW=cm(p.hw);
      const hf=[{x:0,y:0},{x:HWW,y:0},{x:HWW,y:HLL},{x:0,y:HLL}];
      const hpc=pieceFrom(hf,()=>false,sa);
      const handle={
        title:"持ち手", cutInfo:"2枚 ／ 四つ折りにして縫う",
        ...hpc, foldX:null,
        grain:{x1:HWW/2,y1:14,x2:HWW/2,y2:HLL-14},
        notches:[], labelAt:{x:HWW/2,y:HLL/2}
      };
      return {pieces:[body,handle]};
    }
  },

  /* ---- Aラインスカート ---- */
  skirt:{
    mode:"human",
    name:"Aラインスカート",
    note:"前後とも中心を「わ」に置く簡易Aライン（タックなし）。ウエストはゴムまたは脇あきを想定。前後で1枚ずつ＝計2枚裁ちます。",
    params:[
      {key:"waist",label:"ウエスト",unit:"cm",min:50,max:110,step:1,val:70},
      {key:"hip",label:"ヒップ",unit:"cm",min:70,max:130,step:1,val:94},
      {key:"len",label:"スカート丈",unit:"cm",min:30,max:95,step:1,val:58},
      {key:"drop",label:"ヒップ下がり",unit:"cm",min:14,max:24,step:0.5,val:19},
      {key:"flare",label:"裾フレア（脇に+）",unit:"cm",min:0,max:25,step:0.5,val:9},
    ],
    presets:[
      {label:"S",  vals:{waist:62, hip:86,  len:56, drop:18, flare:8}},
      {label:"M",  vals:{waist:70, hip:94,  len:58, drop:19, flare:9}},
      {label:"L",  vals:{waist:78, hip:102, len:60, drop:20, flare:10}},
      {label:"LL", vals:{waist:86, hip:110, len:62, drop:21, flare:11}},
    ],
    toggles:[],
    gen(p,sa){
      const qW=cm(p.waist)/4, qH=cm(p.hip)/4, L=cm(p.len), drop=cm(p.drop), fl=cm(p.flare);
      const sideDip=10; // 脇のウエストを少し下げる
      // 出来上がり線（時計回り, 左=中心わ）
      const wTop={x:0,y:0};
      const wSide={x:qW,y:sideDip};
      const hipPt={x:qH,y:drop};
      const hemSide={x:qH+fl,y:L};
      const hemCF={x:0,y:L};
      let fin=[wTop];
      // ウエスト: CF→脇 ゆるい下りカーブ
      fin=fin.concat(quad(wTop,{x:qW*0.55,y:0},wSide,10));
      // 脇: ウエスト→ヒップ 外ぶくらみ
      fin=fin.concat(quad(wSide,{x:qH*1.02,y:drop*0.62},hipPt,12));
      // ヒップ→裾(直線フレア)
      fin.push(hemSide);
      // 裾: 脇→CF（CFで直角になるよう少し持ち上げ）
      fin=fin.concat(quad(hemSide,{x:qH*0.5,y:L+Math.min(8,fl*0.4)},hemCF,10));
      // CF（わ・直線で上へ）
      fin.push(hemCF);
      const isFold=(a,b)=> a.x===0 && b.x===0; // CF=わ
      const pc=pieceFrom(fin,isFold,sa);
      return {pieces:[{
        title:"前/後 スカート", cutInfo:"中心を「わ」に置いて 前1枚・後1枚（計2枚）",
        ...pc, foldX:0,
        grain:{x1:qH*0.42,y1:drop*0.5,x2:qH*0.42,y2:L*0.86},
        notches:[{x:qH,y:drop}],
        labelAt:{x:qH*0.42,y:L*0.5}
      }]};
    }
  },

  /* ---- Tシャツ（ドロップショルダーのボックスT） ---- */
  tee:{
    mode:"human",
    name:"Tシャツ",
    note:"肩を落としたゆったりボックスT。前後身頃＋袖。まず仮縫いで衿ぐり・袖ぐりを確認してから本縫いを。ニット地向き。",
    params:[
      {key:"bust",label:"バスト",unit:"cm",min:74,max:130,step:1,val:100},
      {key:"len",label:"着丈",unit:"cm",min:45,max:85,step:1,val:66},
      {key:"shoulder",label:"肩幅",unit:"cm",min:34,max:56,step:1,val:44},
      {key:"sleeve",label:"袖丈",unit:"cm",min:8,max:60,step:1,val:20},
      {key:"cuff",label:"袖口（裁ち幅）",unit:"cm",min:10,max:32,step:1,val:18},
      {key:"neckw",label:"衿ぐり幅",unit:"cm",min:14,max:24,step:0.5,val:18},
      {key:"ease",label:"ゆとり（総量）",unit:"cm",min:0,max:30,step:1,val:12},
    ],
    presets:[
      {label:"レディースS", vals:{bust:84,  len:58, shoulder:38, sleeve:18, cuff:16, neckw:17, ease:12}},
      {label:"レディースM", vals:{bust:90,  len:62, shoulder:40, sleeve:19, cuff:17, neckw:18, ease:12}},
      {label:"メンズM",     vals:{bust:96,  len:68, shoulder:44, sleeve:20, cuff:18, neckw:18, ease:12}},
      {label:"メンズL",     vals:{bust:104, len:71, shoulder:46, sleeve:22, cuff:19, neckw:19, ease:14}},
    ],
    toggles:[],
    gen(p,sa){
      const HW=cm(p.bust)/4+cm(p.ease)/4, L=cm(p.len), NWh=cm(p.neckw)/2;
      const slope=cm(4), SHx=cm(p.shoulder)/2+cm(3), ADy=cm(24);
      const body=(back)=>{
        const FD=cm(back?2.5:8);
        const neckCurve=quad({x:0,y:FD},{x:NWh*0.5,y:FD},{x:NWh,y:0},10);
        const armCurve=quad({x:SHx,y:slope},{x:(SHx+HW)/2,y:slope+(ADy-slope)*0.45},{x:HW,y:ADy},10);
        let fin=[{x:0,y:FD}].concat(neckCurve);
        fin.push({x:SHx,y:slope});
        fin=fin.concat(armCurve);
        fin.push({x:HW,y:L}); fin.push({x:0,y:L});
        const isFold=(a,b)=>a.x===0&&b.x===0;
        const pc=pieceFrom(fin,isFold,sa);
        return {pc,
          arm:plen(armCurve), neck:plen(neckCurve),
          piece:{title:back?"後身頃":"前身頃",
            cutInfo:`中心を「わ」／${back?"後ろ":"前"} 1枚`,
            ...pc, foldX:0,
            grain:{x1:HW*0.5,y1:slope+8,x2:HW*0.5,y2:L-14},
            notches:[{x:HW,y:ADy}], labelAt:{x:HW*0.5,y:L*0.55}}};
      };
      const F=body(false), B=body(true);
      // 袖（左右対称・cut2）
      const capFull=F.arm+B.arm, SL=cm(p.sleeve), cuff=cm(p.cuff), capH=cm(2.5), cx=capFull/2;
      let sf=[{x:0,y:capH}];
      sf=sf.concat(quad({x:0,y:capH},{x:cx*0.5,y:0},{x:cx,y:capH*0.4},8));
      sf=sf.concat(quad({x:cx,y:capH*0.4},{x:cx*1.5,y:0},{x:capFull,y:capH},8));
      sf.push({x:(capFull+cuff)/2,y:SL}); sf.push({x:(capFull-cuff)/2,y:SL});
      const spc=pieceFrom(sf,()=>false,sa);
      const sleeve={title:"袖", cutInfo:"2枚（左右）", ...spc, foldX:null,
        grain:{x1:cx,y1:capH+6,x2:cx,y2:SL-6},
        notches:[{x:cx,y:capH*0.4}], labelAt:{x:cx,y:SL*0.55}};
      return {pieces:[F.piece,B.piece,sleeve],
        memo:`衿ぐり1周 約${((F.neck+B.neck)/10).toFixed(0)}cm（衿ぐりバインダーの参考長）`};
    }
  },

/* ============================================================
   状態 & UI 構築
   ============================================================ */
const state={mode:"human", pat:"skirt", params:{}, toggles:{}, sa:1.0, showSew:true};
const MODES=[
  {key:"human",label:"服（大人）"},
  {key:"kids", label:"子供"},
  {key:"small",label:"小物"},
  {key:"bag",  label:"バッグ"},
  {key:"pet",  label:"ペット"},
];
const patsInMode=m=>Object.keys(PATTERNS).filter(k=>PATTERNS[k].mode===m);
const el=id=>document.getElementById(id);
const SVGNS="http://www.w3.org/2000/svg";
function S(tag,attrs){const e=document.createElementNS(SVGNS,tag);
  for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}
function ptsStr(a){return a.map(p=>`${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ");}

function initParams(){
  const def=PATTERNS[state.pat];
  state.params={}; def.params.forEach(f=>state.params[f.key]=f.val);
  state.toggles={}; (def.toggles||[]).forEach(t=>state.toggles[t.key]=t.val);
}

function buildModes(){
  const wrap=el("modeTabs"); wrap.innerHTML="";
  MODES.forEach(m=>{
    const b=document.createElement("button");
    b.textContent=m.label; b.setAttribute("aria-pressed", m.key===state.mode);
    b.onclick=()=>{
      state.mode=m.key;
      const list=patsInMode(m.key);
      if(!list.includes(state.pat)) state.pat=list[0];
      initParams(); buildModes(); buildTabs(); buildFields(); render();
    };
    wrap.appendChild(b);
  });
}
function buildTabs(){
  const wrap=el("patTabs"); wrap.innerHTML="";
  patsInMode(state.mode).forEach(k=>{
    const v=PATTERNS[k];
    const b=document.createElement("button");
    b.textContent=v.name; b.setAttribute("aria-pressed", k===state.pat);
    b.onclick=()=>{state.pat=k; initParams(); render(); buildFields(); buildTabs();};
    wrap.appendChild(b);
  });
}
function buildFields(){
  const def=PATTERNS[state.pat];
  el("patNote").textContent=def.note;
  const box=el("fields"); box.innerHTML="";
  if(def.presets && def.presets.length){
    const ps=document.createElement("div"); ps.className="presets";
    const row=def.presets.map(pr=>`<button type="button">${pr.label}</button>`).join("");
    ps.innerHTML=`<div class="ptitle">目安サイズ（クリックで数値を入れる）</div><div class="prow">${row}</div>`;
    ps.querySelectorAll(".prow button").forEach((btn,i)=>{
      btn.onclick=()=>{
        const vals=def.presets[i].vals;
        def.params.forEach(f=>{ if(f.key in vals){
          state.params[f.key]=Math.min(f.max,Math.max(f.min,vals[f.key])); } });
        buildFields(); render();
      };
    });
    box.appendChild(ps);
  }
  def.params.forEach(f=>{
    const fd=document.createElement("div"); fd.className="field";
    fd.innerHTML=`<label>${f.label}<span><span class="v mono">${state.params[f.key]}</span><span class="unit">${f.unit}</span></span></label>
      <div class="row"><input type="range" min="${f.min}" max="${f.max}" step="${f.step}" value="${state.params[f.key]}">
      <input type="number" min="${f.min}" max="${f.max}" step="${f.step}" value="${state.params[f.key]}"></div>`;
    const [rng,num]=fd.querySelectorAll("input");
    const vlab=fd.querySelector(".v");
    const upd=v=>{v=Math.min(f.max,Math.max(f.min,parseFloat(v)||f.min));
      state.params[f.key]=v; rng.value=v; num.value=v; vlab.textContent=v; render();};
    rng.oninput=e=>upd(e.target.value); num.oninput=e=>upd(e.target.value);
    box.appendChild(fd);
  });
  (def.toggles||[]).forEach(t=>{
    const lab=document.createElement("label"); lab.className="toggle";
    lab.innerHTML=`<input type="checkbox" ${state.toggles[t.key]?"checked":""}> ${t.label}`;
    lab.querySelector("input").onchange=e=>{state.toggles[t.key]=e.target.checked; render();};
    box.appendChild(lab);
  });
}
function buildSAControls(){
  const r=el("saRange"),n=el("saNum"),v=el("saV");
  r.value=state.sa;n.value=state.sa;v.textContent=state.sa.toFixed(1);
  const upd=val=>{val=Math.min(5,Math.max(0,parseFloat(val)||0));
    state.sa=val;r.value=val;n.value=val;v.textContent=val.toFixed(1);render();};
  r.oninput=e=>upd(e.target.value); n.oninput=e=>upd(e.target.value);
  el("showSew").onchange=e=>{state.showSew=e.target.checked;render();};
}

/* ============================================================
   レイアウト：ピースを並べて世界座標を確定
   ============================================================ */
function layout(){
  const res=PATTERNS[state.pat].gen({...state.params, ...state.toggles}, cm(state.sa));
  const pieces=res.pieces; const memo=res.memo||null;
  let curX=CANVAS_PAD, curY=CANVAS_PAD, rowH=0, canvasW=0;
  const placed=pieces.map(pc=>{
    const bb=bbox(pc.cut);
    const w=bb.w, h=bb.h;
    if(curX>CANVAS_PAD && curX+w>WRAP_W){curX=CANVAS_PAD; curY+=rowH+LAYOUT_GAP; rowH=0;}
    const ox=curX-bb.x0, oy=curY-bb.y0;   // cut の左上を (curX,curY) に
    curX+=w+LAYOUT_GAP; rowH=Math.max(rowH,h); canvasW=Math.max(canvasW,curX-LAYOUT_GAP);
    return {pc, ox, oy, w, h};
  });
  const canvasH=curY+rowH+CANVAS_PAD;
  canvasW=Math.max(canvasW,1)+CANVAS_PAD;
  return {placed, canvasW, canvasH, memo};
}

function tileGrid(canvasW,canvasH){
  const cols=Math.max(1,Math.ceil((canvasW-1e-6)/STEP_X));
  const rows=Math.max(1,Math.ceil((canvasH-1e-6)/STEP_Y));
  return {cols,rows};
}
const colLabel=i=>String(i+1);
const rowLabel=i=>String.fromCharCode(65+i); // A,B,...
const tileCode=(c,r)=>`${colLabel(c)}${rowLabel(r)}`;

/* ============================================================
   ピース描画（共通）  g に対して描く
   ============================================================ */
function drawPiece(parent, p, ox, oy, opt){
  const g=S("g",{transform:`translate(${ox},${oy})`}); parent.appendChild(g);
  const sc=opt.scale||1;            // 線幅補正（プレビュー時に細く見えすぎ防止）
  const lw=k=>k/sc;
  // 出来上がり線（縫い線）
  if(opt.showSew!==false){
    g.appendChild(S("polygon",{points:ptsStr(p.finished),fill:"none",
      stroke:"var(--chalk)","stroke-width":lw(0.8),"stroke-dasharray":`${lw(4)} ${lw(3)}`}));
  }
  // 裁ち切り線
  g.appendChild(S("polygon",{points:ptsStr(p.cut),fill:"rgba(46,99,180,0.05)",
    stroke:"var(--vermilion)","stroke-width":lw(1.1)}));
  // わ（縦）
  if(p.foldX!=null){
    const bb=bbox(p.cut);
    g.appendChild(S("line",{x1:p.foldX,y1:bb.y0,x2:p.foldX,y2:bb.y1,
      stroke:"var(--ink)","stroke-width":lw(1),"stroke-dasharray":`${lw(7)} ${lw(2)} ${lw(1)} ${lw(2)}`}));
    const t=S("text",{x:p.foldX+lw(2),y:(bb.y0+bb.y1)/2,fill:"var(--ink)",
      "font-size":lw(5),"transform":`rotate(-90 ${p.foldX+lw(2)} ${(bb.y0+bb.y1)/2})`,
      "text-anchor":"middle"}); t.textContent="わ"; g.appendChild(t);
  }
  // わ（横＝底）
  if(p.foldY!=null){
    const bb=bbox(p.cut);
    g.appendChild(S("line",{x1:bb.x0,y1:p.foldY,x2:bb.x1,y2:p.foldY,
      stroke:"var(--ink)","stroke-width":lw(1),"stroke-dasharray":`${lw(7)} ${lw(2)} ${lw(1)} ${lw(2)}`}));
    const t=S("text",{x:(bb.x0+bb.x1)/2,y:p.foldY-lw(2),fill:"var(--ink)",
      "font-size":lw(5),"text-anchor":"middle"}); t.textContent="わ（底）"; g.appendChild(t);
  }
  // ひも通し口（巾着）
  if(p.casingLines){
    const bb=bbox(p.cut);
    p.casingLines.forEach(cy=>{
      g.appendChild(S("line",{x1:bb.x0,y1:cy,x2:bb.x1,y2:cy,
        stroke:"var(--chalk)","stroke-width":lw(0.7),"stroke-dasharray":`${lw(3)} ${lw(2)}`}));
    });
    const t=S("text",{x:bbox(p.cut).x1-lw(2),y:p.casingLines[0]-lw(1.5),"text-anchor":"end",
      fill:"var(--chalk)","font-size":lw(3.6)}); t.textContent="ひも通し口"; g.appendChild(t);
  }
  // マチ切り欠き（トート）
  if(p.cornerMark){
    p.cornerMark.forEach(m=>{
      g.appendChild(S("rect",{x:m.x===0?0:m.x,y:m.y,width:m.c,height:m.c,
        fill:"none",stroke:"var(--vermilion)","stroke-width":lw(0.7),
        "stroke-dasharray":`${lw(2)} ${lw(1.5)}`}));
    });
  }
  // 合印
  (p.notches||[]).forEach(nt=>{
    g.appendChild(S("line",{x1:nt.x,y1:nt.y-lw(3),x2:nt.x,y2:nt.y+lw(3),
      stroke:"var(--ink)","stroke-width":lw(1.2)}));
  });
  // 布目線
  if(p.grain){
    const gid=opt.arrowId;
    g.appendChild(S("line",{x1:p.grain.x1,y1:p.grain.y1,x2:p.grain.x2,y2:p.grain.y2,
      stroke:"var(--ink)","stroke-width":lw(0.9),
      "marker-start":`url(#${gid})`,"marker-end":`url(#${gid})`}));
    const mx=(p.grain.x1+p.grain.x2)/2, my=(p.grain.y1+p.grain.y2)/2;
    const t=S("text",{x:mx+lw(3),y:my,fill:"var(--ink)","font-size":lw(4.2),
      "transform":`rotate(-90 ${mx+lw(3)} ${my})`,"text-anchor":"middle"});
    t.textContent="布目線"; g.appendChild(t);
  }
  // ラベル
  if(p.labelAt){
    const t=S("text",{x:p.labelAt.x,y:p.labelAt.y,"text-anchor":"middle",
      fill:"var(--ink)","font-size":lw(6),"font-weight":"700"});
    t.textContent=p.title; g.appendChild(t);
    const t2=S("text",{x:p.labelAt.x,y:p.labelAt.y+lw(7),"text-anchor":"middle",
      fill:"var(--muted)","font-size":lw(3.6)});
    t2.textContent=p.cutInfo; g.appendChild(t2);
  }
}

function arrowMarker(id,scale){
  const m=S("marker",{id,markerWidth:10,markerHeight:10,refX:5,refY:5,
    orient:"auto",markerUnits:"userSpaceOnUse"});
  const s=(8/(scale||1));
  m.setAttribute("markerWidth",s);m.setAttribute("markerHeight",s);
  m.setAttribute("refX",s/2);m.setAttribute("refY",s/2);
  const path=S("path",{d:`M${s*0.5},0 L${s},${s*0.5} L${s*0.5},${s} M${s*0.5},${s*0.5} L0,${s*0.5}`,
    fill:"none",stroke:"var(--ink)","stroke-width":Math.max(0.4,0.9/(scale||1))});
  // 双方向矢じり用にシンプルな矢
  m.appendChild(S("path",{d:`M0,0 L${s},${s/2} L0,${s} Z`,fill:"var(--ink)"}));
  return m;
}

/* ============================================================
   プレビュー描画
   ============================================================ */
function render(){
  const {placed,canvasW,canvasH,memo}=layout();
  const def=PATTERNS[state.pat];
  el("patNote").textContent = memo ? `${def.note} ／ ${memo}` : def.note;
  const {cols,rows}=tileGrid(canvasW,canvasH);
  el("sheetCount").textContent=cols*rows;
  buildSAControls();

  const svg=el("preview");
  svg.innerHTML="";
  // 表示スケール：横幅を約 min(820, 利用幅) に収める
  const wrap=svg.closest(".preview-wrap");
  const availW=Math.max(320,(wrap?wrap.clientWidth:760)-60);
  const availH=Math.max(320,(wrap?wrap.clientHeight:600)-70);
  const scale=Math.min(availW/canvasW, availH/canvasH, 2.4);
  svg.setAttribute("width",(canvasW*scale).toFixed(0));
  svg.setAttribute("height",(canvasH*scale).toFixed(0));
  svg.setAttribute("viewBox",`0 0 ${canvasW} ${canvasH}`);

  const defs=S("defs",{}); svg.appendChild(defs);
  defs.appendChild(arrowMarker("arrPrev",scale));

  // 製図グリッド 50mm
  const grid=S("g",{}); svg.appendChild(grid);
  for(let x=0;x<=canvasW;x+=50)grid.appendChild(S("line",{x1:x,y1:0,x2:x,y2:canvasH,
    stroke:"var(--rule-soft)","stroke-width":0.4/scale}));
  for(let y=0;y<=canvasH;y+=50)grid.appendChild(S("line",{x1:0,y1:y,x2:canvasW,y2:y,
    stroke:"var(--rule-soft)","stroke-width":0.4/scale}));

  // ピース
  const opt={scale,showSew:state.showSew,arrowId:"arrPrev"};
  placed.forEach(pl=>drawPiece(svg,pl.pc,pl.ox,pl.oy,opt));

  // A4 境界オーバーレイ
  const grp=S("g",{}); svg.appendChild(grp);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=c*STEP_X, y=r*STEP_Y;
    grp.appendChild(S("rect",{x,y,width:CONTENT_W,height:CONTENT_H,fill:"none",
      stroke:"var(--tape)","stroke-width":0.8/scale,"stroke-dasharray":`${6/scale} ${4/scale}`,opacity:.8}));
    const t=S("text",{x:x+3,y:y+8,fill:"var(--tape)","font-size":7/scale,"font-weight":"700"});
    t.textContent=tileCode(c,r); grp.appendChild(t);
  }
}

/* ============================================================
   印刷：案内シート + タイル
   ============================================================ */
function buildPrintSheets(){
  const root=el("print-root"); root.innerHTML="";
  const {placed,canvasW,canvasH,memo}=layout();
  const {cols,rows}=tileGrid(canvasW,canvasH);
  const def=PATTERNS[state.pat];

  /* --- 案内シート --- */
  const guide=document.createElement("div"); guide.className="sheet";
  const gs=S("svg",{width:"210mm",height:"297mm",viewBox:`0 0 ${PAGE_W} ${PAGE_H}`});
  guide.appendChild(gs); root.appendChild(guide);
  const G=(tag,a)=>{const e=S(tag,a);gs.appendChild(e);return e;};
  // 見出し
  let ty=24;
  const title=S("text",{x:MARGIN,y:ty,"font-size":7,"font-weight":"800",fill:"#1B1D1A","font-family":"sans-serif"});
  title.textContent=`カタガミ — ${def.name}`; gs.appendChild(title);
  G("line",{x1:MARGIN,y1:ty+3,x2:PAGE_W-MARGIN,y2:ty+3,stroke:"#1B1D1A","stroke-width":0.5});
  ty+=14;
  const sub=S("text",{x:MARGIN,y:ty,"font-size":4,fill:"#444","font-family":"sans-serif"});
  sub.textContent="案内シート ／ まず校正枠を測ってから型紙を切り出してください"; gs.appendChild(sub);
  ty+=12;
  // パラメータ一覧
  const lh=6.4;
  const addLine=(s)=>{const t=S("text",{x:MARGIN,y:ty,"font-size":4,fill:"#1B1D1A","font-family":"monospace"});
    t.textContent=s;gs.appendChild(t);ty+=lh;};
  def.params.forEach(f=>addLine(`${f.label}：${state.params[f.key]} ${f.unit}`));
  (def.toggles||[]).forEach(t=>addLine(`${t.label}：${state.toggles[t.key]?"あり":"なし"}`));
  addLine(`縫い代：${state.sa.toFixed(1)} cm`);
  addLine(`型紙シート：${cols}列 × ${rows}行 ＝ ${cols*rows} 枚`);
  if(memo) addLine(memo);
  ty+=4;

  // 校正枠 50mm + 100mm定規
  const calX=MARGIN, calY=ty;
  G("rect",{x:calX,y:calY,width:50,height:50,fill:"none",stroke:"#C24033","stroke-width":0.5});
  const ct=S("text",{x:calX+25,y:calY+27,"text-anchor":"middle","font-size":3.4,fill:"#C24033","font-family":"sans-serif"});
  ct.textContent="この枠＝50mm"; gs.appendChild(ct);
  const ct2=S("text",{x:calX+25,y:calY+32,"text-anchor":"middle","font-size":2.6,fill:"#777","font-family":"sans-serif"});
  ct2.textContent="定規で確認"; gs.appendChild(ct2);
  // 100mm 定規
  const rulY=calY+62, rulX=calX;
  G("line",{x1:rulX,y1:rulY,x2:rulX+100,y2:rulY,stroke:"#1B1D1A","stroke-width":0.5});
  for(let i=0;i<=100;i+=10){
    const big=i%50===0;
    G("line",{x1:rulX+i,y1:rulY,x2:rulX+i,y2:rulY-(big?4:2.5),stroke:"#1B1D1A","stroke-width":0.4});
    const lt=S("text",{x:rulX+i,y:rulY-(big?6:4.5),"text-anchor":"middle","font-size":2.6,fill:"#1B1D1A","font-family":"monospace"});
    lt.textContent=i; gs.appendChild(lt);
  }
  const rt=S("text",{x:rulX,y:rulY+6,"font-size":3,fill:"#777","font-family":"sans-serif"});
  rt.textContent="0–100mm 校正定規"; gs.appendChild(rt);

  // 組み立て図（タイル配置のミニマップ）右側
  const mapX=120, mapY=calY, mw=78, mh=78;
  const cell=Math.min(mw/cols, mh/rows, 16);
  const mt=S("text",{x:mapX,y:mapY-4,"font-size":4,"font-weight":"700",fill:"#1B1D1A","font-family":"sans-serif"});
  mt.textContent="貼り合わせ図"; gs.appendChild(mt);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=mapX+c*cell, y=mapY+r*cell;
    G("rect",{x,y,width:cell,height:cell,fill:"#F5F4EE",stroke:"#1B1D1A","stroke-width":0.3});
    const tc=S("text",{x:x+cell/2,y:y+cell/2+1.4,"text-anchor":"middle","font-size":Math.min(4,cell*0.4),fill:"#2E63B4","font-family":"monospace"});
    tc.textContent=tileCode(c,r); gs.appendChild(tc);
  }
  const mn=S("text",{x:mapX,y:mapY+rows*cell+6,"font-size":2.8,fill:"#777","font-family":"sans-serif"});
  mn.textContent=`左上(1A)から右へ→下へ並べ、約${OVERLAP}mmの重ね代を合わせて貼ります`; gs.appendChild(mn);

  // 注意書き
  const warn=S("text",{x:MARGIN,y:PAGE_H-MARGIN-4,"font-size":3.4,fill:"#C24033","font-family":"sans-serif","font-weight":"700"});
  warn.textContent="印刷倍率＝100%（実際のサイズ）／「用紙に合わせる」はオフ"; gs.appendChild(warn);

  /* --- タイル群 --- */
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const sheet=document.createElement("div"); sheet.className="sheet";
    const svg=S("svg",{width:"210mm",height:"297mm",viewBox:`0 0 ${PAGE_W} ${PAGE_H}`});
    sheet.appendChild(svg); root.appendChild(sheet);
    const defs=S("defs",{}); svg.appendChild(defs);
    defs.appendChild(arrowMarker("arr_"+r+"_"+c,1));
    // クリップ（内容領域）
    const clipId=`clip_${r}_${c}`;
    const clip=S("clipPath",{id:clipId});
    clip.appendChild(S("rect",{x:MARGIN,y:MARGIN,width:CONTENT_W,height:CONTENT_H}));
    defs.appendChild(clip);

    const originX=c*STEP_X, originY=r*STEP_Y;
    const world=S("g",{transform:`translate(${MARGIN-originX},${MARGIN-originY})`,
      "clip-path":`url(#${clipId})`});
    svg.appendChild(world);

    // 50mm グリッド（貼り合わせ補助）
    const grid=S("g",{}); world.appendChild(grid);
    const gx0=Math.floor(originX/50)*50, gy0=Math.floor(originY/50)*50;
    for(let x=gx0;x<=originX+CONTENT_W;x+=50)grid.appendChild(S("line",{x1:x,y1:gy0,x2:x,y2:originY+CONTENT_H+50,
      stroke:"#E7E4D8","stroke-width":0.2}));
    for(let y=gy0;y<=originY+CONTENT_H;y+=50)grid.appendChild(S("line",{x1:gx0,y1:y,x2:originX+CONTENT_W+50,y2:y,
      stroke:"#E7E4D8","stroke-width":0.2}));

    // ピース
    const opt={scale:1,showSew:state.showSew,arrowId:"arr_"+r+"_"+c};
    placed.forEach(pl=>drawPiece(world,pl.pc,pl.ox,pl.oy,opt));

    // --- 内容枠・トンボ・タイル情報（クリップ外＝ページ座標） ---
    const x0=MARGIN,y0=MARGIN,x1=MARGIN+CONTENT_W,y1=MARGIN+CONTENT_H;
    svg.appendChild(S("rect",{x:x0,y:y0,width:CONTENT_W,height:CONTENT_H,fill:"none",
      stroke:"#1B1D1A","stroke-width":0.3,"stroke-dasharray":"2 2"}));
    // 角トンボ
    const cm2=4;
    [[x0,y0,1,1],[x1,y0,-1,1],[x0,y1,1,-1],[x1,y1,-1,-1]].forEach(([x,y,sx,sy])=>{
      svg.appendChild(S("line",{x1:x,y1:y,x2:x+sx*cm2,y2:y,stroke:"#1B1D1A","stroke-width":0.4}));
      svg.appendChild(S("line",{x1:x,y1:y,x2:x,y2:y+sy*cm2,stroke:"#1B1D1A","stroke-width":0.4}));
    });
    // タイルコード（大）
    const code=S("text",{x:x0+2,y:y0-2.5,"font-size":5,"font-weight":"800",fill:"#2E63B4","font-family":"monospace"});
    code.textContent=tileCode(c,r); svg.appendChild(code);
    const tot=S("text",{x:x1,y:y0-2.5,"font-size":3,fill:"#777","text-anchor":"end","font-family":"sans-serif"});
    tot.textContent=`${def.name}  ／  ${c+1}列 ${rowLabel(r)}行  （全${cols*rows}枚）`; svg.appendChild(tot);
    // 隣接案内
    const mid=(a,b)=>(a+b)/2;
    if(c<cols-1){const t=S("text",{x:x1-1,y:mid(y0,y1),"text-anchor":"end","font-size":3.4,
      fill:"#C24033","font-family":"sans-serif","font-weight":"700"});
      t.textContent=`→ ${tileCode(c+1,r)} へ`; svg.appendChild(t);}
    if(r<rows-1){const t=S("text",{x:mid(x0,x1),y:y1-1.5,"text-anchor":"middle","font-size":3.4,
      fill:"#C24033","font-family":"sans-serif","font-weight":"700"});
      t.textContent=`↓ ${tileCode(c,r+1)} へ`; svg.appendChild(t);}
    if(c>0){const t=S("text",{x:x0+1,y:mid(y0,y1),"text-anchor":"start","font-size":2.8,
      fill:"#999","font-family":"sans-serif"});
      t.textContent=`${tileCode(c-1,r)} と重ねる`; svg.appendChild(t);}
    if(r>0){const t=S("text",{x:mid(x0,x1),y:y0+4,"text-anchor":"middle","font-size":2.8,
      fill:"#999","font-family":"sans-serif"});
      t.textContent=`${tileCode(c,r-1)} と重ねる`; svg.appendChild(t);}
  }
}

el("printBtn").onclick=()=>{
  buildPrintSheets();
  setTimeout(()=>window.print(),60);
};

/* ---- 起動 ---- */
initParams(); buildModes(); buildTabs(); buildFields(); buildSAControls(); render();
window.addEventListener("resize",()=>render());
</script>
